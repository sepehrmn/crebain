name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate frontend
        run: |
          set -o pipefail
          bun run validate 2>&1 | tee frontend-validation.log

      - name: Record frontend validation summary
        if: always()
        run: |
          {
            echo "### Frontend validation"
            echo ""
            echo "- Command: \`bun run validate\`"
            echo "- Job log file: \`frontend-validation.log\`"
            echo ""
            echo "\`\`\`"
            grep -E "Test Files|Tests|tsc --noEmit" frontend-validation.log || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

  backend:
    name: Backend (Rust)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Rust
        run: |
          set -o pipefail
          bun run check:rust 2>&1 | tee rust-check.log

      - name: Clippy
        run: |
          set -o pipefail
          bun run clippy:rust 2>&1 | tee rust-clippy.log

      - name: Run tests
        run: |
          set -o pipefail
          bun run test:rust 2>&1 | tee rust-test.log

      - name: Record backend validation summary
        if: always()
        run: |
          {
            echo "### Backend validation (${{ matrix.os }})"
            echo ""
            echo "- Commands: \`bun run check:rust\`, \`bun run clippy:rust\`, \`bun run test:rust\`"
            echo "- Job log files: \`rust-check.log\`, \`rust-clippy.log\`, \`rust-test.log\`"
            echo ""
            echo "\`\`\`"
            grep -E "test result:|Finished|error:" rust-check.log rust-clippy.log rust-test.log || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
