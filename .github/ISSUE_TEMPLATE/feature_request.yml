name: Feature request
description: Propose a capability or improvement
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: summary
    attributes:
      label: Feature description
      description: What should CREBAIN do that it does not today?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Use case and motivation
      description: The problem this solves and who benefits.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Proposed behavior and acceptance criteria
      description: How would we know it works and is complete?
    validations:
      required: true
  - type: textarea
    id: assumptions
    attributes:
      label: Security, model, ROS/Zenoh, and performance assumptions
      description: Any boundaries, external inputs, or measured-claim implications.
  - type: textarea
    id: implementation
    attributes:
      label: Proposed implementation (optional)
